<!DOCTYPE html>
<html>
<head><title>Test Fetch</title></head>
<body>
<h1>Testing Data Fetch...</h1>
<div id="result"></div>
<script>
const FINNHUB_KEY = 'd7g2qrpr01qqb8ri54kgd7g2qrpr01qqb8ri54l0';

async function testFetch() {
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '<p>Starting tests...</p>';
  
  // Test 1: Finnhub SPY
  try {
    resultDiv.innerHTML += '<p>Testing Finnhub SPY...</p>';
    const r1 = await fetch(`https://finnhub.io/api/v1/quote?symbol=SPY&token=${FINNHUB_KEY}`);
    const j1 = await r1.json();
    resultDiv.innerHTML += `<p style="color:green">✓ Finnhub SPY: ${JSON.stringify(j1)}</p>`;
  } catch(e) {
    resultDiv.innerHTML += `<p style="color:red">✗ Finnhub SPY failed: ${e.message}</p>`;
  }
  
  // Test 2: Finnhub QQQ
  try {
    resultDiv.innerHTML += '<p>Testing Finnhub QQQ...</p>';
    const r2 = await fetch(`https://finnhub.io/api/v1/quote?symbol=QQQ&token=${FINNHUB_KEY}`);
    const j2 = await r2.json();
    resultDiv.innerHTML += `<p style="color:green">✓ Finnhub QQQ: ${JSON.stringify(j2)}</p>`;
  } catch(e) {
    resultDiv.innerHTML += `<p style="color:red">✗ Finnhub QQQ failed: ${e.message}</p>`;
  }
  
  // Test 3: VIX via corsproxy
  try {
    resultDiv.innerHTML += '<p>Testing VIX via corsproxy...</p>';
    const YF_URL = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=1d';
    const r3 = await fetch('https://corsproxy.io/?' + encodeURIComponent(YF_URL));
    const j3 = await r3.json();
    const price = j3?.chart?.result?.[0]?.meta?.regularMarketPrice;
    resultDiv.innerHTML += `<p style="color:green">✓ VIX: ${price}</p>`;
  } catch(e) {
    resultDiv.innerHTML += `<p style="color:red">✗ VIX failed: ${e.message}</p>`;
  }
  
  resultDiv.innerHTML += '<p><strong>Tests complete!</strong></p>';
}

testFetch();
</script>
</body>
</html>
